apiVersion: batch/v1
kind: Job
metadata:
  name: cypress-run
  namespace: cypress-e2e
spec:
  completions: 4
  parallelism: 4
  template:
    spec:
      containers:
        - name: cypress
          image: $(echo "${ghcr.io/${{ github.repository }}/app}" | tr '[:upper:]' '[:lower:]'):${{ github.sha }}
          # Environment Variables für URLs
          env:
            - name: CYPRESS_baseUrl
              value: "http://localhost:3000"   # Base URL für Tests
            - name: CYPRESS_loginPath
              value: "/login"
            - name: CYPRESS_dashboardPath
              value: "/dashboard"
            - name: TOTAL_RUNNERS
              value: "4"            
          command:
            - sh
            - -c
            - |
              echo "Pod index: $HOSTNAME"
              # App im Hintergrund starten
              node demo-app/server.js &
              # Warten bis App auf localhost:3000 bereit ist
              npx wait-on http://localhost:3000

              # Cypress headless ausführen              
              #INDEX=$(echo $HOSTNAME | awk -F '-' '{print $NF}')
              #echo "Runner index: $INDEX"
              #SPECS=$(ls cypress/e2e/*.cy.js | sort)
              #COUNT=0
              #for SPEC in $SPECS
              #do
              #  if [ $((COUNT % TOTAL_RUNNERS)) -eq $INDEX ]; then
              #    echo "Running $SPEC"
              #    npx cypress run --spec "$SPEC" \
                    --reporter mochawesome \
                    --reporter-options reportDir=results,overwrite=false,html=false,json=true                
              #  fi
              #  COUNT=$((COUNT+1))
              #done

      restartPolicy: Never
  backoffLimit: 1