stages:  
  - build
  - test

# Variables
# -----------------------------
variables:
  CYPRESS_baseUrl: "http://localhost:3000"
  CYPRESS_loginPath: "/login"
  CYPRESS_dashboardPath: "/dashboard"
  NODE_ENV: "test"
  CYPRESS_CACHE_FOLDER: "$CI_PROJECT_DIR/cache/Cypress"
  IMAGE_NAME: $CI_REGISTRY_IMAGE/cypress-tests-image
  RUN_IN_CLUSTER: "true"

cache:
  key: ${CI_COMMIT_REF_SLUG}
  paths:
    - node_modules/
    - cache/Cypress

# Docker build
# -----------------------------
build-image:
  stage: build
  image: docker:24
  services:
    - docker:24-dind    # Alternative Kaniko oder BuildKit
  tags:
    - docker
  script:
    - docker build -t $IMAGE_NAME:$CI_COMMIT_SHA .
    - docker tag $IMAGE_NAME:$CI_COMMIT_SHA $IMAGE_NAME:latest
    - docker push $IMAGE_NAME:$CI_COMMIT_SHA
    - docker push $IMAGE_NAME:latest
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    
# ---------------------------
# E2E TEST EXECUTION
# ---------------------------
cypress_e2e_tests:
  stage: test
  needs:
    - build-image
  image: $IMAGE_NAME:$CI_COMMIT_SHA
  tags:
    - docker
  script:    
    - npx start-server-and-test start http://localhost:3000 cypress run --browser chrome --headless
    
  artifacts:
    when: always
    paths:
      - cypress/videos/
      - cypress/screenshots/
      - results/
    reports:
      junit: results/junit.xml
    expire_in: 7 days
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH

# ---------------------------
# PARALLEL EXECUTION
# ---------------------------
cypress_parallel:
  stage: test
  image: $IMAGE_NAME:$CI_COMMIT_SHA
  parallel: 3
  tags:
    - docker
  script:    
    - npm start &
    - npx wait-on http://localhost:3000    
    - npx cypress run --record --parallel --browser chrome --ci-build-id $CI_PIPELINE_ID
  artifacts:
    when: always
    paths:
      - cypress/videos/
      - cypress/screenshots/
      - results/
    reports:
      junit: results/*.xml
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
  when: manual
# -----------------------------
# Alternative Option 2 - Tests laufen in Kubernetes-Cluster
# Kubernetes Job Trigger
# -----------------------------
e2e_tests_cluster:
  stage: test
  image: bitnami/kubectl:latest
  tags:
    - kubernetes
  script:
    - kubectl apply -f k8s/cypress-secret.yml
    - kubectl apply -f k8s/cypress-job.yml
    - kubectl wait --for=condition=complete job/cypress-run --timeout=300s
    # Pod-Namen holen
    - POD_NAME=$(kubectl get pods -l job-name=cypress-run -o jsonpath="{.items[0].metadata.name}")    
    # Reports aus Pod kopieren
    - kubectl cp $POD_NAME:/app/results ./results
    - kubectl cp $POD_NAME:/app/cypress/videos ./cypress/videos
    - kubectl cp $POD_NAME:/app/cypress/screenshots ./cypress/screenshots
  artifacts:
    when: always
    paths:
      - results/
      - cypress/videos/
      - cypress/screenshots/
    reports:
      junit: results/*.xml
  rules:
    - if: '$RUN_IN_CLUSTER == "true"'